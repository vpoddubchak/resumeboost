services:
  postgres:
    image: postgres:16-alpine
    container_name: resumeboost-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: resumeboost
      POSTGRES_USER: resumeboost
      POSTGRES_PASSWORD: resumeboost_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resumeboost -d resumeboost"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
